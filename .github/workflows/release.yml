name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          SF_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "sf_version=$SF_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git tag | grep -qx "v${{ steps.version.outputs.sf_version }}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.sf_version }}"
          git push origin "v${{ steps.version.outputs.sf_version }}"
          gh release create "v${{ steps.version.outputs.sf_version }}" sf.js \
            --title "sf ${{ steps.version.outputs.sf_version }}" \
            --notes "Generated from Salesforce CLI v${{ steps.version.outputs.sf_version }} in a clean CI environment."
